<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>土留め親ぐい計算ソフト</title>
<script src="chart.umd.min.js"></script>
<script src="jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#1a1a2e;--surface:#16213e;--surface2:#0f3460;
  --accent:#e94560;--accent2:#4cc9f0;--text:#eaeaea;
  --text2:#a0a0b0;--border:#2a2a4a;--ok:#4caf50;
  --warn:#ff9800;--err:#f44336;--r:8px;
  --sh:0 4px 20px rgba(0,0,0,.4);--bot:60px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Arial,sans-serif;font-size:14px;min-height:100vh}
.app{display:grid;grid-template-rows:auto 1fr;grid-template-columns:360px 1fr;height:100vh}
header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px;box-shadow:var(--sh);flex-shrink:0}
header h1{font-size:1.05rem;font-weight:700;color:var(--accent2);white-space:nowrap}
header .hs{color:var(--text2);font-size:0.75rem;display:none}
.mtabs{display:flex;gap:6px;margin-left:auto}
.tbtn{padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:0.82rem;transition:.2s;min-height:36px}
.tbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* sidebar */
.sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:12px 12px 20px;display:flex;flex-direction:column;gap:3px}
.ah{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface2);border-radius:var(--r);cursor:pointer;user-select:none;border:1px solid var(--border);margin-bottom:1px}
.ah h3{font-size:0.8rem;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.aarr{font-size:0.65rem;color:var(--text2);transition:transform .2s}
.ah.open .aarr{transform:rotate(180deg)}
.ab{padding:10px 2px 6px;display:none}
.ab.open{display:block}
label{display:block;font-size:0.8rem;color:var(--text2);margin-bottom:3px;margin-top:9px}
label:first-child{margin-top:0}
input[type=number],input[type=text],select{width:100%;padding:9px 11px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:0.92rem;transition:.2s;min-height:42px;-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:var(--accent2);background:#1e2a45}
.unit{font-size:0.7rem;color:var(--text2);margin-left:3px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
/* layer cards */
.llist{display:flex;flex-direction:column;gap:7px}
.lcard{background:var(--bg);border:2px solid var(--border);border-radius:var(--r);padding:9px}
.lhd{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.lnum{width:24px;height:24px;border-radius:50%;background:var(--surface2);border:1px solid var(--accent2);display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;color:var(--accent2);flex-shrink:0}
.ldel{background:none;border:none;color:var(--err);cursor:pointer;font-size:1.3rem;line-height:1;padding:2px 4px;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;margin-left:auto}
.lp{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.lp label,.lthick label{margin-top:5px;font-size:0.73rem}
.lp input,.lthick input{min-height:38px;font-size:0.88rem;padding:7px 8px}
.lname{flex:1;min-height:34px;padding:5px 9px;font-size:0.88rem}
.addl{width:100%;padding:11px;background:transparent;border:2px dashed var(--border);border-radius:var(--r);color:var(--text2);cursor:pointer;font-size:0.88rem;transition:.2s;margin-top:4px;min-height:46px}
.addl:hover{border-color:var(--accent2);color:var(--accent2)}
/* stage cards */
.slist{display:flex;flex-direction:column;gap:6px}
.scard{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px}
.scard-hd{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.snum{width:22px;height:22px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;color:#fff;flex-shrink:0}
.scard-hd span{font-size:0.8rem;color:var(--text2);flex:1}
.sdel{background:none;border:none;color:var(--err);cursor:pointer;font-size:1.2rem;padding:2px 4px}
/* buttons */
.cbtn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#c0392b);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:1.02rem;font-weight:700;transition:.2s;min-height:50px}
.cbtn:active{transform:scale(.98)}
.exrow{display:flex;gap:7px;margin-top:8px}
.exbtn{flex:1;padding:9px 4px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface2);color:var(--text);cursor:pointer;font-size:0.78rem;transition:.2s;min-height:42px}
.exbtn:hover{border-color:var(--accent2);color:var(--accent2)}
/* main */
.main{overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}
/* result tabs */
.rtabs{display:flex;gap:4px;flex-wrap:wrap}
.rtab{padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:0.8rem;transition:.2s}
.rtab.active{background:var(--surface2);color:var(--accent2);border-color:var(--accent2)}
.rpanel{display:none}
.rpanel.active{display:block}
/* result cards */
.rgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-top:10px}
.rc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px}
.rc .rl{font-size:0.73rem;color:var(--text2)}
.rc .rv{font-size:1.45rem;font-weight:700;margin:3px 0;color:var(--accent2)}
.rc .rs{font-size:0.7rem;color:var(--text2)}
.rc.ok .rv{color:var(--ok)}
.rc.warn .rv{color:var(--warn)}
.rc.err .rv{color:var(--err)}
/* charts */
.crow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:12px}
.cbox{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.cbox h4{font-size:0.78rem;color:var(--text2);margin-bottom:10px}
.cbox canvas{max-height:340px}
/* tables */
.rtable{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-top:12px}
.rtable h4{padding:9px 14px;font-size:0.82rem;border-bottom:1px solid var(--border);color:var(--text2)}
table{width:100%;border-collapse:collapse;font-size:0.78rem}
th{background:var(--surface2);padding:7px 10px;text-align:right;font-size:0.72rem;color:var(--text2);font-weight:600}
th:first-child{text-align:left}
td{padding:6px 10px;border-bottom:1px solid var(--border);text-align:right;font-family:monospace}
td:first-child{text-align:left;font-family:inherit}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(76,201,240,.04)}
/* status */
.sbar{padding:9px 13px;border-radius:var(--r);font-size:0.83rem;font-weight:600}
.sbar.ok{background:rgba(76,175,80,.1);border:1px solid var(--ok);color:var(--ok)}
.sbar.err{background:rgba(244,67,54,.1);border:1px solid var(--err);color:var(--err)}
.sbar.info{background:rgba(76,201,240,.1);border:1px solid var(--accent2);color:var(--accent2)}
.shd{font-size:0.93rem;font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
/* stability cards */
.stab-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.stab-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.stab-card h5{font-size:0.8rem;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.fs-big{font-size:2rem;font-weight:700;margin:6px 0}
.fs-ok{color:var(--ok)}.fs-warn{color:var(--warn)}.fs-err{color:var(--err)}
.fs-sub{font-size:0.72rem;color:var(--text2)}
.formula-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;margin-top:8px;font-size:0.75rem;color:var(--text2);line-height:1.7;font-family:monospace}
/* stage table */
.stage-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-top:10px}
.stage-strip h5{font-size:0.78rem;color:var(--text2);margin-bottom:8px}
.stage-row{display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.stage-row:last-child{border-bottom:none}
.stage-label{font-size:0.78rem;color:var(--text2);width:80px;flex-shrink:0}
.stage-val{font-size:0.88rem;font-weight:600;flex:1}
.stage-badge{font-size:0.7rem;padding:2px 8px;border-radius:20px;background:rgba(76,201,240,.15);color:var(--accent2);border:1px solid var(--accent2)}
.stage-badge.warn{background:rgba(255,152,0,.15);color:var(--warn);border-color:var(--warn)}
/* mobile */
@media(max-width:768px){
  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;padding-bottom:var(--bot)}
  header{flex-shrink:0}header .hs{display:block}
  header h1{font-size:0.95rem}
  .sidebar{flex:1;overflow-y:auto;border-right:none;display:none}
  .sidebar.spa{display:flex}
  .main{flex:1;overflow-y:auto;display:none}
  .main.spa{display:flex}
  .bnav{display:flex;position:fixed;bottom:0;left:0;right:0;height:calc(var(--bot) + env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
  .bnav button{flex:1;background:none;border:none;color:var(--text2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:0.62rem;padding:6px 0;transition:.2s}
  .bnav button .ic{font-size:1.25rem}
  .bnav button.active{color:var(--accent2)}
  .crow{grid-template-columns:1fr}
  .stab-grid{grid-template-columns:1fr}
  .rgrid{grid-template-columns:1fr 1fr}
  .rtable{overflow-x:auto}
  table{min-width:520px}
}
@media(min-width:769px){
  .bnav{display:none}
  .sidebar{display:flex!important}
  .main{display:flex!important}
}
</style>
</head>
<body>
<div class="app">
<header>
  <div>
    <h1>🏗 土留め親ぐい計算ソフト</h1>
    <span class="hs">Earth Retaining Pile Calculator</span>
  </div>
  <div class="mtabs">
    <button class="tbtn active" onclick="switchMethod('conv')">慣用法</button>
    <button class="tbtn" onclick="switchMethod('elastic')">弾塑性法</button>
  </div>
</header>

<!-- SIDEBAR -->
<div class="sidebar spa" id="sidebar">

  <!-- 基本条件 -->
  <div>
    <div class="ah open" onclick="toggleAcc(this)"><h3>📐 基本条件</h3><span class="aarr">▼</span></div>
    <div class="ab open">
      <div class="r2">
        <div><label>掘削深さ H <span class="unit">m</span></label>
          <input type="number" id="H" value="6.0" step="0.1" min="0.5" inputmode="decimal"></div>
        <div><label>掘削幅 B <span class="unit">m</span></label>
          <input type="number" id="B_excav" value="10.0" step="0.5" min="1" inputmode="decimal"></div>
      </div>
      <div class="r2">
        <div><label>地下水位 hw <span class="unit">m</span></label>
          <input type="number" id="hw" value="2.0" step="0.1" min="0" inputmode="decimal"></div>
        <div><label>親ぐい間隔 lp <span class="unit">m</span></label>
          <input type="number" id="l_pile" value="1.5" step="0.1" min="0.5" inputmode="decimal"></div>
      </div>
      <label>上載荷重 q <span class="unit">kN/m²</span></label>
      <input type="number" id="surcharge" value="10" step="5" min="0" inputmode="numeric">
    </div>
  </div>

  <!-- 施工ステージ -->
  <div>
    <div class="ah open" onclick="toggleAcc(this)"><h3>🔧 施工ステージ</h3><span class="aarr">▼</span></div>
    <div class="ab open">
      <div id="stage-list" class="slist"></div>
      <button class="addl" onclick="addStage()" style="margin-top:6px">＋ ステージを追加</button>
    </div>
  </div>

  <!-- 地層 -->
  <div>
    <div class="ah open" onclick="toggleAcc(this)"><h3>🪨 地層・土質定数</h3><span class="aarr">▼</span></div>
    <div class="ab open">
      <div id="layer-list" class="llist"></div>
      <button class="addl" onclick="addLayer()">＋ 地層を追加</button>
    </div>
  </div>

  <!-- 弾塑性 -->
  <div id="ep-params" style="display:none">
    <div class="ah open" onclick="toggleAcc(this)"><h3>⚙️ 弾塑性法パラメータ</h3><span class="aarr">▼</span></div>
    <div class="ab open">
      <label>地盤反力係数 kh <span class="unit">kN/m³</span></label>
      <input type="number" id="kh" value="10000" step="100" inputmode="numeric">
      <label>受動土圧低減係数 α</label>
      <input type="number" id="alpha_ep" value="1.0" step="0.1" min="0.1" max="1.5" inputmode="decimal">
    </div>
  </div>

  <!-- 親ぐい断面 -->
  <div>
    <div class="ah" onclick="toggleAcc(this)"><h3>🔩 親ぐい断面</h3><span class="aarr">▼</span></div>
    <div class="ab">
      <label>部材種類</label>
      <select id="pile_type" onchange="updatePileInputs()">
        <option value="H">H形鋼</option>
        <option value="custom">任意断面</option>
      </select>
      <div id="h_steel_inputs">
        <label>H形鋼規格</label>
        <select id="h_size" onchange="updatePileProps()">
          <option value="200x200x8x12">H-200×200×8×12</option>
          <option value="250x250x9x14">H-250×250×9×14</option>
          <option value="300x300x10x15">H-300×300×10×15</option>
          <option value="350x350x12x19" selected>H-350×350×12×19</option>
          <option value="400x400x13x21">H-400×400×13×21</option>
          <option value="414x405x18x28">H-414×405×18×28</option>
          <option value="458x417x30x50">H-458×417×30×50</option>
          <option value="custom_h">カスタム入力</option>
        </select>
      </div>
      <div class="r2">
        <div><label>I <span class="unit">cm⁴</span></label>
          <input type="number" id="I_val" value="40400" step="100" inputmode="numeric"></div>
        <div><label>Z <span class="unit">cm³</span></label>
          <input type="number" id="Z_val" value="2310" step="10" inputmode="numeric"></div>
      </div>
      <div class="r2">
        <div><label>fb <span class="unit">N/mm²</span></label>
          <input type="number" id="fb" value="190" step="5" inputmode="numeric"></div>
        <div><label>E <span class="unit">kN/cm²</span></label>
          <input type="number" id="E_val" value="20500" step="100" inputmode="numeric"></div>
      </div>
    </div>
  </div>

  <!-- 腹起し・切梁 -->
  <div>
    <div class="ah" onclick="toggleAcc(this)"><h3>🏗 腹起し・切梁</h3><span class="aarr">▼</span></div>
    <div class="ab">
      <label>腹起し H形鋼規格</label>
      <select id="w_size" onchange="updateWalingProps()">
        <option value="250x250x9x14">H-250×250×9×14</option>
        <option value="300x300x10x15" selected>H-300×300×10×15</option>
        <option value="350x350x12x19">H-350×350×12×19</option>
        <option value="400x400x13x21">H-400×400×13×21</option>
      </select>
      <div class="r2">
        <div><label>Zw <span class="unit">cm³</span></label>
          <input type="number" id="Zw" value="1360" step="10" inputmode="numeric"></div>
        <div><label>fb_w <span class="unit">N/mm²</span></label>
          <input type="number" id="fb_w" value="190" step="5" inputmode="numeric"></div>
      </div>
      <label>切梁 H形鋼規格</label>
      <select id="s_size" onchange="updateStrutProps()">
        <option value="250x250x9x14">H-250×250×9×14</option>
        <option value="300x300x10x15" selected>H-300×300×10×15</option>
        <option value="350x350x12x19">H-350×350×12×19</option>
        <option value="400x400x13x21">H-400×400×13×21</option>
      </select>
      <div class="r2">
        <div><label>As <span class="unit">cm²</span></label>
          <input type="number" id="As" value="120" step="1" inputmode="numeric"></div>
        <div><label>Is <span class="unit">cm⁴</span></label>
          <input type="number" id="Is" value="20400" step="100" inputmode="numeric"></div>
      </div>
      <div class="r2">
        <div><label>切梁長 Ls <span class="unit">m</span></label>
          <input type="number" id="L_strut" value="10.0" step="0.5" inputmode="decimal"></div>
        <div><label>有効長係数 μ</label>
          <input type="number" id="mu" value="0.7" step="0.1" min="0.3" max="1.0" inputmode="decimal"></div>
      </div>
      <div class="r2">
        <div><label>切梁水平間隔 <span class="unit">m</span></label>
          <input type="number" id="l_strut_h" value="5.0" step="0.5" inputmode="decimal"></div>
        <div><label>fa <span class="unit">N/mm²</span></label>
          <input type="number" id="fa_strut" value="160" step="5" inputmode="numeric"></div>
      </div>
    </div>
  </div>

  <!-- 土圧設定 -->
  <div>
    <div class="ah" onclick="toggleAcc(this)"><h3>📊 土圧計算設定</h3><span class="aarr">▼</span></div>
    <div class="ab">
      <label>土圧公式</label>
      <select id="ep_method">
        <option value="rankine">ランキン式</option>
        <option value="coulomb">クーロン式</option>
      </select>
      <div class="r2">
        <div><label>δ <span class="unit">°（クーロン）</span></label>
          <input type="number" id="delta_w" value="15" step="1" inputmode="numeric"></div>
        <div><label>土圧割増係数</label>
          <input type="number" id="ep_fac" value="1.0" step="0.05" min="0.5" max="2.0" inputmode="decimal"></div>
      </div>
    </div>
  </div>

  <div style="margin-top:6px">
    <button class="cbtn" onclick="calculate()">▶ 計算実行</button>
    <div class="exrow">
      <button class="exbtn" onclick="exportCSV()">📄 CSV</button>
      <button class="exbtn" onclick="exportPDF()">📑 PDF</button>
      <button class="exbtn" onclick="window.print()">🖨 印刷</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main-content">
  <div class="sbar info" id="status-msg">条件を入力して「計算実行」を押してください。</div>

  <div id="result-wrap" style="display:none">
    <div class="rtabs" id="rtabs">
      <button class="rtab active" onclick="switchRTab(0)">📋 サマリー</button>
      <button class="rtab" onclick="switchRTab(1)">📈 ステージ別</button>
      <button class="rtab" onclick="switchRTab(2)">🔒 底面安定</button>
      <button class="rtab" onclick="switchRTab(3)">🔧 支保工</button>
      <button class="rtab" onclick="switchRTab(4)">📄 詳細表</button>
    </div>

    <!-- Tab 0: Summary -->
    <div class="rpanel active" id="tab0">
      <div class="rgrid" id="result-cards"></div>
      <div class="crow" id="charts-area">
        <div class="cbox"><h4>土圧分布図</h4><canvas id="chart-ep"></canvas></div>
        <div class="cbox"><h4>せん断力図 SFD</h4><canvas id="chart-sfd"></canvas></div>
        <div class="cbox"><h4>曲げモーメント図 BMD</h4><canvas id="chart-bmd"></canvas></div>
      </div>
    </div>

    <!-- Tab 1: Stages -->
    <div class="rpanel" id="tab1">
      <div class="shd" style="margin-top:4px">施工ステージ別 断面力</div>
      <div id="stage-results"></div>
    </div>

    <!-- Tab 2: Base stability -->
    <div class="rpanel" id="tab2">
      <div class="shd" style="margin-top:4px">掘削底面安定照査</div>
      <div class="stab-grid" id="stability-cards"></div>
    </div>

    <!-- Tab 3: Support -->
    <div class="rpanel" id="tab3">
      <div class="shd" style="margin-top:4px">腹起し・切梁 断面計算</div>
      <div id="support-results"></div>
    </div>

    <!-- Tab 4: Detail table -->
    <div class="rpanel" id="tab4">
      <div class="rtable">

// ============================================================
// PILE / WALING / STRUT SECTION
// ============================================================
function updatePileInputs(){
  const t=document.getElementById('pile_type').value;
  document.getElementById('h_steel_inputs').style.display=t==='H'?'':'none';
  if(t==='H')updatePileProps();
}
function updatePileProps(){
  const s=document.getElementById('h_size').value;
  if(s==='custom_h')return;
  const d=HSTEEL[s];if(!d)return;

  document.getElementById('Z_val').value=d.Z;
}
function updateWalingProps(){

function updateStrutProps(){

  document.getElementById('Is').value=d.I;

// ============================================================
// LAYER HELPERS
// ============================================================
function getLayerAt(z){
  let t=0;
  for(const l of layers){
    if(z<=t+l.thick)return l;
    t+=l.thick;
  }
  return layers[layers.length-1];
}
function getSv(z,hw){
  let t=0,sv=0;
  for(const l of layers){
    const top=t,bot=Math.min(t+l.thick,z);
    if(bot<=top)break;
    const aboveW=Math.max(0,Math.min(bot,hw)-top);
    const belowW=Math.max(0,bot-Math.max(top,hw));
    sv+=aboveW*l.gamma+belowW*(l.gsat-gamma_w);
    t+=l.thick;
    if(t>=z)break;
  }
  return sv;
}
function getAvgCu(H){
  // weighted average c in lowest 0.5*B or H zone
  let t=0,wc=0,wt=0;
  for(const l of layers){
    const top=t,bot=Math.min(t+l.thick,H);
    if(bot>top){const th=bot-top;wc+=l.c*th;wt+=th;}
    t+=l.thick;if(t>=H)break;
  }
  return wt>0?wc/wt:0;
}
function getAvgGamma(H){
  let t=0,wg=0,wt=0;
  for(const l of layers){
    const top=t,bot=Math.min(t+l.thick,H);
    if(bot>top){const th=bot-top;wg+=l.gamma*th;wt+=th;}
    t+=l.thick;if(t>=H)break;
  }
  return wt>0?wg/wt:18;
}

// ============================================================
// EARTH PRESSURE
// ============================================================
function Ka(phi,method,delta=0){
  const p=phi*Math.PI/180;
  if(method==='rankine')return Math.tan(Math.PI/4-p/2)**2;
  const d=delta*Math.PI/180;
  const sq=Math.sqrt(Math.sin(p+d)*Math.sin(p)/Math.cos(d));
  return Math.cos(p)**2/(Math.cos(d)*(1+sq)**2);
}
function Kp(phi,method,delta=0){
  const p=phi*Math.PI/180;
  if(method==='rankine')return Math.tan(Math.PI/4+p/2)**2;
  const d=delta*Math.PI/180;
  const sq=Math.sqrt(Math.sin(p+d)*Math.sin(p)/Math.cos(d));
  return Math.cos(p)**2/(Math.cos(d)*(1-sq)**2);
}

function buildPressure(depths,H,hw,epMethod,delta,epFac,q_sur=0){
  const pa=[],pp=[];
  depths.forEach(z=>{
    const l=getLayerAt(z);
    const sv=getSv(z,hw)+q_sur;
    const ka=Ka(l.phi,epMethod,delta);
    const kp=Kp(l.phi,epMethod,delta);
    const uw=z>hw?gamma_w*(z-hw):0;
    pa.push(Math.max(0,epFac*(ka*sv-2*l.c*Math.sqrt(ka))+uw));
    if(z>=H){
      const ze=z-H;
      const lbot=getLayerAt(H+ze);
      const sv_e=(hw<H?(H-hw)*(lbot.gsat-gamma_w):0)+ze*(lbot.gsat-gamma_w);
      pp.push(Math.max(0,kp*sv_e+2*lbot.c*Math.sqrt(kp)));
    } else pp.push(0);
  });
  return{pa,pp};
}

// ============================================================
// CONVENTIONAL - single stage
// ============================================================
function calcStage(H,hw,strutList,epMethod,delta,epFac,q_sur){
  const nDiv=400,dz=(H+12)/nDiv;
  const depths=Array.from({length:nDiv+1},(_,i)=>i*dz);
  const{pa,pp}=buildPressure(depths,H,hw,epMethod,delta,epFac,q_sur);
  const pnet=pa.map((p,i)=>depths[i]<H?p:Math.max(0,pp[i]-p));

  // Find D by moment equilibrium
  let D=findD(H,pnet,depths,dz,strutList);
  D=Math.max(D,1.5);

  const total=H+D,nDiv2=500,dz2=total/nDiv2;
  const d2=Array.from({length:nDiv2+1},(_,i)=>i*dz2);
  const{pa:pa2,pp:pp2}=buildPressure(d2,H,hw,epMethod,delta,epFac,q_sur);
  const pnet2=pa2.map((p,i)=>d2[i]<H?p:Math.max(0,pp2[i]-p));

  const{sfd,bmd,reactions}=intSFDBMD(d2,pnet2,dz2,strutList,H,total);
  const Mmax=Math.max(...bmd.map(Math.abs));
  const Qmax=Math.max(...sfd.map(Math.abs));
  return{D,Mmax,Qmax,depths:d2,pa:pa2,pp:pp2,pnet:pnet2,sfd,bmd,reactions,H,total};
}

function findD(H,pnet,depths,dz,struts){
  for(let D=0.5;D<=15;D+=0.1){
    let Ma=0,Mp=0;
    depths.forEach((z,i)=>{
      if(i===0)return;
      const load=(pnet[i-1]+pnet[i])/2;
      if(z<=H)Ma+=load*dz*(H-z);
      if(z>H&&z<=H+D)Mp+=load*dz*(z-H);
    });
    if(Mp>=1.5*Ma)return D;
  }
  return 5.0;
}

function intSFDBMD(depths,pnet,dz,struts,H,total){
  const n=depths.length;
  const q=pnet.map((p,i)=>depths[i]<H?p:-p);
  const sfd=new Array(n).fill(0);
  const bmd=new Array(n).fill(0);
  const reactions=[];

  if(struts.length===0){
    for(let i=1;i<n;i++)sfd[i]=sfd[i-1]+(q[i-1]+q[i])/2*dz;
    for(let i=1;i<n;i++)bmd[i]=bmd[i-1]+(sfd[i-1]+sfd[i])/2*dz;
  } else {
    // moment about pile toe → solve top strut reaction
    const sp0=struts[0];
    const spIdx=depths.reduce((b,z,i)=>Math.abs(z-sp0)<Math.abs(depths[b]-sp0)?i:b,0);
    let Mtoe=0;
    for(let i=1;i<n;i++){const arm=total-(depths[i-1]+depths[i])/2;Mtoe+=(q[i-1]+q[i])/2*dz*arm;}
    const R=Mtoe/(total-depths[spIdx]);
    reactions.push({pos:depths[spIdx],R});
    for(let i=1;i<n;i++){sfd[i]=sfd[i-1]+(q[i-1]+q[i])/2*dz;if(i===spIdx)sfd[i]-=R;}
    for(let i=1;i<n;i++)bmd[i]=bmd[i-1]+(sfd[i-1]+sfd[i])/2*dz;
  }
  return{sfd,bmd,reactions};
}

// ============================================================
// ELASTIC (beam on Winkler foundation)
// ============================================================
function calcElastic(H,hw,strutList,epMethod,delta,epFac,q_sur,E_kNcm2,I_cm4,kh,alpha){
  const nDiv=160,total=H+8,dz=total/nDiv,n=nDiv+1;
  const depths=Array.from({length:n},(_,i)=>i*dz);
  const{pa,pp}=buildPressure(depths,H,hw,epMethod,delta,epFac,q_sur);
  const ksp=depths.map(z=>z>H?kh*dz:0);
  const qv=pa.map((p,i)=>depths[i]<H?p*dz:0);
  const EI=E_kNcm2*1e4*I_cm4*1e-8;
  const{y,M,V}=solveBEF(n,dz,EI,ksp,qv,strutList,H,depths,alpha);
  const Mmax=Math.max(...M.map(Math.abs));
  const Qmax=Math.max(...V.map(Math.abs));
  const pnet=pa.map((p,i)=>depths[i]<H?p:Math.max(0,pp[i]-p));
  const D=total-H;
  return{D,Mmax,Qmax,depths,pa,pp,pnet,sfd:V,bmd:M,reactions:[],H,total,
    maxDisp:Math.max(...y.map(Math.abs))};
}

function solveBEF(n,dz,EI,ksp,qv,struts,H,depths,alpha){
  const dz4=dz**4,c=EI/dz4;
  const A=Array.from({length:n},()=>new Float64Array(n));
  const b=new Float64Array(n);
  for(let i=0;i<n;i++){
    A[i][i]=6*c+ksp[i]*alpha;
    if(i>0)A[i][i-1]=-4*c;if(i<n-1)A[i][i+1]=-4*c;
    if(i>1)A[i][i-2]=c;if(i<n-2)A[i][i+2]=c;
    b[i]=qv[i];
  }
  struts.forEach(sp=>{
    let bi=0;depths.forEach((z,i)=>{if(Math.abs(z-sp)<Math.abs(depths[bi]-sp))bi=i;});
    A[bi][bi]+=1e10;
  });
  A[n-1][n-1]+=1e12;A[n-2][n-2]+=1e12;
  const y=gaussElim(A,b,n);
  const M=new Array(n).fill(0),V=new Array(n).fill(0);
  for(let i=1;i<n-1;i++)M[i]=EI*(y[i-1]-2*y[i]+y[i+1])/dz**2;
  for(let i=1;i<n-2;i++)V[i]=EI*(y[i+2]-2*y[i+1]+2*y[i-1]-y[i-2])/(2*dz**3);
  return{y:Array.from(y),M:Array.from(M),V:Array.from(V)};
}

function gaussElim(A,b,n){
  for(let c=0;c<n;c++){
    let mxR=c;for(let r=c+1;r<n;r++)if(Math.abs(A[r][c])>Math.abs(A[mxR][c]))mxR=r;
    [A[c],A[mxR]]=[A[mxR],A[c]];[b[c],b[mxR]]=[b[mxR],b[c]];
    const pv=A[c][c];if(Math.abs(pv)<1e-14)continue;
    for(let r=c+1;r<n;r++){const f=A[r][c]/pv;for(let k=c;k<n;k++)A[r][k]-=f*A[c][k];b[r]-=f*b[c];}
  }
  const x=new Float64Array(n);
  for(let i=n-1;i>=0;i--){x[i]=b[i];for(let j=i+1;j<n;j++)x[i]-=A[i][j]*x[j];x[i]/=A[i][i];}
  return x;
}

// ============================================================
// HEAVING (Terzaghi + Bjerrum-Eide)
// ============================================================
function calcHeaving(H,B_excav,q_sur){
  const cu=getAvgCu(H);
  const gamma=getAvgGamma(H);
  if(cu<1)return{applicable:false,reason:'c/cu ≈ 0（砂質土）：ヒービング照査対象外'};

  const q0=gamma*H+q_sur;
  const Nc_t=Math.PI+2; // Terzaghi = 5.14
  const B=B_excav;
  // Terzaghi (with depth correction)
  const qf_t=Nc_t*cu;
  const denom_t=q0-cu*Math.SQRT2/B;
  const Fs_t=denom_t>0?qf_t/denom_t:999;

  // Bjerrum-Eide Nc interpolation
  const NcBE=bjerrumNc(H,B);
  const Fs_be=NcBE*cu/q0;

  return{applicable:true,cu,gamma,q0,H,B,
    Fs_t:Math.min(Fs_t,20),Nc_t,qf_t,denom_t,
    Fs_be,NcBE,required:1.2};
}

function bjerrumNc(H,B){
  const r=H/B;
  // Interpolated from Bjerrum-Eide (1956) table
  const tbl=[[0,6.14],[0.25,6.5],[0.5,6.9],[1.0,7.6],[1.5,8.3],[2.0,8.8],[3.0,9.5],[4.0,9.7]];
  if(r<=tbl[0][0])return tbl[0][1];
  if(r>=tbl[tbl.length-1][0])return tbl[tbl.length-1][1];
  for(let i=0;i<tbl.length-1;i++){
    if(r>=tbl[i][0]&&r<=tbl[i+1][0]){
      const t=(r-tbl[i][0])/(tbl[i+1][0]-tbl[i][0]);
      return tbl[i][1]+t*(tbl[i+1][1]-tbl[i][1]);
    }
  }
  return 6.14;
}

// ============================================================
// BOILING (Terzaghi)
// ============================================================
function calcBoiling(H,hw,D){
  const dh=Math.max(0,H-hw);
  if(dh<=0)return{applicable:false,reason:'地下水位 ≥ 掘削底面：ボイリング照査対象外'};
  const lbot=getLayerAt(H);
  const gp=lbot.gsat-gamma_w;
  // Terzaghi: Fs = 2γ'D / (γw * Δh)
  const Fs=2*gp*D/(gamma_w*dh);
  return{applicable:true,dh,gp,D,Fs,required:1.5};
}

// ============================================================
// HEAVE (盤ぶくれ, base heave for embedded condition)
// ============================================================
function calcBaseHeave(H,hw,D,B_excav,q_sur){
  const cu=getAvgCu(H+D*0.5);
  if(cu<1)return{applicable:false,reason:'砂質土：盤ぶくれ照査対象外'};
  const gamma=getAvgGamma(H);
  // Simplified: Fs = Nc*cu / (γH+q)
  const Nc=bjerrumNc(H,B_excav);
  const q0=gamma*H+q_sur;
  const Fs=Nc*cu/q0;
  return{applicable:true,cu,Nc,q0,Fs,required:1.2};
}

// ============================================================
// WALING & STRUT
// ============================================================
function calcWalingStrut(stageResults){
  // Collect all strut reaction forces
  const Zw=+document.getElementById('Zw').value;
  const fb_w=+document.getElementById('fb_w').value;
  const As=+document.getElementById('As').value;
  const Is=+document.getElementById('Is').value;
  const Ls=+document.getElementById('L_strut').value;
  const mu=+document.getElementById('mu').value;
  const ls_h=+document.getElementById('l_strut_h').value; // horizontal strut spacing
  const fa=+document.getElementById('fa_strut').value;
  const lp=+document.getElementById('l_pile').value;
  const E=+document.getElementById('E_val').value; // kN/cm²

  // Find max reaction from all stages
  const rows=[];
  stageResults.forEach((sr,i)=>{
    sr.reactions.forEach(rxn=>{
      // R is per unit length (kN/m). Force on waling per strut bay:
      const Fw=rxn.R*ls_h; // kN (total force per strut)
      const R_m=rxn.R; // kN/m along waling
      // Waling bending moment (continuous beam, 3+ spans): M=wL²/10
      const Mw=R_m*ls_h**2/10; // kN·m
      const sig_w=Mw*100/Zw*10; // N/mm²
      // Strut axial force
      const Ps=Fw; // kN
      // Buckling check
      const Leff=mu*Ls*100; // cm
      const i_s=Math.sqrt(Is/As); // radius of gyration cm
      const lambda=Leff/i_s;
      // Simplified fa curve (SS400): fa = 156 - 0.5*lambda (for lambda ≤ 120)
      const fa_buck=lambda<=120?156-0.5*lambda:98000/(lambda**2);
      const sig_s=Ps/As*10; // N/mm² (Ps kN, As cm²)
      rows.push({
        stage:i+1,R:rxn.R.toFixed(2),pos:rxn.pos.toFixed(2),
        Mw:Mw.toFixed(2),sig_w:sig_w.toFixed(1),fb_w,ok_w:sig_w<=fb_w,
        Ps:Ps.toFixed(1),lambda:lambda.toFixed(0),fa_buck:fa_buck.toFixed(0),
        sig_s:sig_s.toFixed(1),fa,ok_s:sig_s<=Math.min(fa,fa_buck)
      });
    });
  });
  return{rows,Zw,fb_w,As,Is,Ls,mu,ls_h,lp};
}

// ============================================================
// MAIN CALCULATE
// ============================================================
function calculate(){
  try{
    const H=+document.getElementById('H').value;
    const B=+document.getElementById('B_excav').value;
    const hw=+document.getElementById('hw').value;
    const q_sur=+document.getElementById('surcharge').value;
    const epMethod=document.getElementById('ep_method').value;
    const delta=+document.getElementById('delta_w').value;
    const epFac=+document.getElementById('ep_fac').value;
    const Z_cm3=+document.getElementById('Z_val').value;
    const I_cm4=+document.getElementById('I_val').value;
    const fb=+document.getElementById('fb').value;
    const E_kNcm2=+document.getElementById('E_val').value;
    const kh=+document.getElementById('kh').value;
    const alpha=+document.getElementById('alpha_ep').value;

    // Run each stage
    const stageResults=[];
    for(let i=0;i<stages.length;i++){
      const s=stages[i];
      // Collect struts active at this stage (those installed in previous stages)
      const activeStruts=stages.slice(0,i).filter(ss=>ss.strut&&ss.spos!=null).map(ss=>ss.spos);
      let sr;
      if(method==='conv'){
        sr=calcStage(s.depth,hw,activeStruts,epMethod,delta,epFac,q_sur);
      } else {
        sr=calcElastic(s.depth,hw,activeStruts,epMethod,delta,epFac,q_sur,E_kNcm2,I_cm4,kh,alpha);
      }
      stageResults.push(sr);
    }

    // Final stage = last entry
    const final=stageResults[stageResults.length-1];
    // Max across all stages
    const Mmax_all=Math.max(...stageResults.map(s=>s.Mmax));
    const Qmax_all=Math.max(...stageResults.map(s=>s.Qmax));
    const D=final.D;

    const sig_b=Mmax_all*100/Z_cm3*10;
    const ratio=sig_b/fb;
    const Z_req=Mmax_all*100/fb*10;

    // Stability
    const heaving=calcHeaving(H,B,q_sur);
    const boiling=calcBoiling(H,hw,D);
    const baseheave=calcBaseHeave(H,hw,D,B,q_sur);

    // Waling/strut
    const support=calcWalingStrut(stageResults);

    lastResult={
      method,H,B,hw,D,Mmax:Mmax_all,Qmax:Qmax_all,sig_b,ratio,Z_req,Z_cm3,fb,
      stageResults,final,heaving,boiling,baseheave,support,
      maxDisp:final.maxDisp
    };

    document.getElementById('result-wrap').style.display='';
    requestAnimationFrame(()=>displayAll(lastResult));
    const ok=ratio<=1&&(!heaving.applicable||heaving.Fs_t>=heaving.required)&&(!boiling.applicable||boiling.Fs>=boiling.required);
    setStatus(`計算完了 — D=${D.toFixed(2)}m | Mmax=${Mmax_all.toFixed(1)}kN·m/m | 応力比=${ratio.toFixed(3)} ${ratio<=1?'✅ OK':'❌ NG'}`, ok?'ok':'err');
  }catch(e){setStatus('エラー: '+e.message,'err');console.error(e);}
}

// ============================================================
// DISPLAY
// ============================================================
function displayAll(r){
  displaySummary(r);
  displayStages(r.stageResults);
  displayStability(r.heaving,r.boiling,r.baseheave);
  displaySupport(r.support);
  displayTable(r.final);
  drawCharts(r.final);
}

function displaySummary(r){
  const cls=r.ratio<=0.8?'ok':r.ratio<=1?'warn':'err';
  document.getElementById('result-cards').innerHTML=`
    <div class="rc"><div class="rl">計算手法</div><div class="rv" style="font-size:1rem">${r.method==='conv'?'慣用法':'弾塑性法'}</div></div>
    <div class="rc"><div class="rl">必要根入れ長 D</div><div class="rv">${r.D.toFixed(2)}<span style="font-size:.85rem"> m</span></div><div class="rs">根切り深さ H = ${r.H.toFixed(1)} m</div></div>
    <div class="rc"><div class="rl">最大曲げモーメント</div><div class="rv">${r.Mmax.toFixed(2)}<span style="font-size:.85rem"> kN·m/m</span></div><div class="rs">全ステージ最大値</div></div>
    <div class="rc ${cls}"><div class="rl">曲げ応力度 σ / fb</div><div class="rv">${r.sig_b.toFixed(1)}<span style="font-size:.85rem"> / ${r.fb}</span></div><div class="rs">比率 ${r.ratio.toFixed(3)}</div></div>
    <div class="rc"><div class="rl">必要断面係数 Z_req</div><div class="rv">${r.Z_req.toFixed(0)}<span style="font-size:.85rem"> cm³</span></div><div class="rs">採用 ${r.Z_cm3} cm³ ${r.Z_cm3>=r.Z_req?'✅':'❌'}</div></div>
    ${r.maxDisp!=null?`<div class="rc"><div class="rl">最大変位量</div><div class="rv">${(r.maxDisp*1000).toFixed(1)}<span style="font-size:.85rem"> mm</span></div></div>`:''}
  `;
}

function displayStages(srs){
  const el=document.getElementById('stage-results');
  el.innerHTML='';
  srs.forEach((sr,i)=>{
    const div=document.createElement('div');
    div.className='stage-strip';
    const strutInfo=stages[i].strut?`切梁設置 @ ${stages[i].spos}m`:'切梁なし';
    div.innerHTML=`
      <h5>ステージ ${i+1}：掘削深さ ${sr.H.toFixed(1)} m ／ ${strutInfo}</h5>
      <div class="stage-row"><span class="stage-label">根入れ長 D</span><span class="stage-val">${sr.D.toFixed(2)} m</span></div>
      <div class="stage-row"><span class="stage-label">最大M</span><span class="stage-val">${sr.Mmax.toFixed(2)} kN·m/m</span></div>
      <div class="stage-row"><span class="stage-label">最大Q</span><span class="stage-val">${sr.Qmax.toFixed(2)} kN/m</span></div>
      ${sr.reactions.map(rx=>`<div class="stage-row"><span class="stage-label">支保反力</span><span class="stage-val">${rx.R.toFixed(2)} kN/m <span class="stage-badge">@${rx.pos.toFixed(2)}m</span></span></div>`).join('')}
    `;
    el.appendChild(div);
  });
}

function fsBadge(Fs,req){
  const cls=Fs>=req*1.2?'ok':Fs>=req?'warn':'err';
  const label=Fs>=req?'OK':'NG';
  return `<div class="fs-big fs-${cls}">${Fs.toFixed(2)}</div>
    <div class="fs-sub">必要 Fs ≥ ${req} — <strong>${label}</strong></div>`;
}

function displayStability(hv,bl,bh){
  const el=document.getElementById('stability-cards');
  el.innerHTML='';

  // Heaving
  const hvDiv=document.createElement('div');hvDiv.className='stab-card';
  hvDiv.innerHTML=`<h5>ヒービング照査（Terzaghi 法）</h5>`;
  if(!hv.applicable){
    hvDiv.innerHTML+=`<div class="fs-sub" style="margin-top:8px">${hv.reason}</div>`;
  } else {
    hvDiv.innerHTML+=fsBadge(hv.Fs_t,hv.required);
    hvDiv.innerHTML+=`<div class="formula-box">
cu = ${hv.cu.toFixed(1)} kN/m²<br>
q₀ = γH + q = ${hv.q0.toFixed(1)} kN/m²<br>
Nc = π+2 = ${hv.Nc_t.toFixed(2)}<br>
qf = Nc·cu = ${hv.qf_t.toFixed(1)} kN/m²<br>
Fs = ${hv.qf_t.toFixed(1)} / ${hv.denom_t.toFixed(1)} = ${hv.Fs_t.toFixed(2)}</div>`;
  }
  el.appendChild(hvDiv);

  // Bjerrum-Eide
  if(hv.applicable){
    const beDiv=document.createElement('div');beDiv.className='stab-card';
    beDiv.innerHTML=`<h5>ヒービング照査（Bjerrum-Eide 法）</h5>`;
    beDiv.innerHTML+=fsBadge(hv.Fs_be,hv.required);
    beDiv.innerHTML+=`<div class="formula-box">
H/B = ${(hv.H/hv.B).toFixed(2)}<br>
Nc(H/B) = ${hv.NcBE.toFixed(2)}<br>
q₀ = ${hv.q0.toFixed(1)} kN/m²<br>
Fs = Nc·cu/q₀ = ${hv.Fs_be.toFixed(2)}</div>`;
    el.appendChild(beDiv);
  }

  // Boiling
  const blDiv=document.createElement('div');blDiv.className='stab-card';
  blDiv.innerHTML=`<h5>ボイリング照査（Terzaghi 法）</h5>`;
  if(!bl.applicable){
    blDiv.innerHTML+=`<div class="fs-sub" style="margin-top:8px">${bl.reason}</div>`;
  } else {
    blDiv.innerHTML+=fsBadge(bl.Fs,bl.required);
    blDiv.innerHTML+=`<div class="formula-box">
Δh = H - hw = ${bl.dh.toFixed(2)} m<br>
γ' = ${bl.gp.toFixed(2)} kN/m³<br>
D = ${bl.D.toFixed(2)} m<br>
Fs = 2γ'D / (γw·Δh)<br>
   = ${bl.Fs.toFixed(2)}</div>`;
  }
  el.appendChild(blDiv);

  // Base heave
  const bhDiv=document.createElement('div');bhDiv.className='stab-card';
  bhDiv.innerHTML=`<h5>盤ぶくれ照査（粘性土）</h5>`;
  if(!bh.applicable){
    bhDiv.innerHTML+=`<div class="fs-sub" style="margin-top:8px">${bh.reason}</div>`;
  } else {
    bhDiv.innerHTML+=fsBadge(bh.Fs,bh.required);
    bhDiv.innerHTML+=`<div class="formula-box">
cu = ${bh.cu.toFixed(1)} kN/m²<br>
Nc = ${bh.Nc.toFixed(2)}<br>
q₀ = ${bh.q0.toFixed(1)} kN/m²<br>
Fs = Nc·cu/q₀ = ${bh.Fs.toFixed(2)}</div>`;
  }
  el.appendChild(bhDiv);
}

function displaySupport(sup){
  const el=document.getElementById('support-results');
  if(sup.rows.length===0){
    el.innerHTML='<div class="sbar info" style="margin-top:10px">切梁が設定されていません。施工ステージで「切梁を設置」にチェックしてください。</div>';
    return;
  }
  let html=`<div class="rtable"><h4>腹起し断面計算（水平切梁間隔 ${sup.ls_h}m）</h4>
  <table><thead><tr><th>ｽﾃｰｼﾞ</th><th>位置 m</th><th>支保反力 kN/m</th><th>M kN·m</th><th>σ N/mm²</th><th>fb N/mm²</th><th>判定</th></tr></thead><tbody>`;
  sup.rows.forEach(r=>{
    html+=`<tr><td>St.${r.stage}</td><td>${r.pos}</td><td>${r.R}</td><td>${r.Mw}</td>
      <td>${r.sig_w}</td><td>${r.fb_w}</td><td>${r.ok_w?'✅ OK':'❌ NG'}</td></tr>`;
  });
  html+=`</tbody></table></div>`;
  html+=`<div class="rtable" style="margin-top:12px"><h4>切梁断面計算（長さ ${sup.Ls}m、有効長係数 μ=${sup.mu}）</h4>
  <table><thead><tr><th>ｽﾃｰｼﾞ</th><th>位置 m</th><th>軸力 kN</th><th>λ</th><th>fa_buck N/mm²</th><th>σ N/mm²</th><th>fa N/mm²</th><th>判定</th></tr></thead><tbody>`;
  sup.rows.forEach(r=>{
    html+=`<tr><td>St.${r.stage}</td><td>${r.pos}</td><td>${r.Ps}</td><td>${r.lambda}</td>
      <td>${r.fa_buck}</td><td>${r.sig_s}</td><td>${r.fa}</td><td>${r.ok_s?'✅ OK':'❌ NG'}</td></tr>`;
  });
  html+=`</tbody></table></div>`;
  el.innerHTML=html;
}

function displayTable(r){
  const tbody=document.getElementById('detail-tbody');tbody.innerHTML='';
  const step=Math.max(1,Math.floor(r.depths.length/60));
  r.depths.forEach((z,i)=>{
    if(i%step!==0)return;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${z.toFixed(2)}</td><td>${r.pa[i].toFixed(2)}</td><td>${(r.pp[i]||0).toFixed(2)}</td><td>${r.pnet[i].toFixed(2)}</td><td>${r.sfd[i].toFixed(2)}</td><td>${r.bmd[i].toFixed(2)}</td>`;
    tbody.appendChild(tr);
  });
}

// ============================================================
// CHARTS
// ============================================================
function drawCharts(r){
  const step=Math.max(1,Math.floor(r.depths.length/80));
  const idx=r.depths.map((_,i)=>i).filter(i=>i%step===0);
  const labels=idx.map(i=>(-r.depths[i]).toFixed(1));
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};
  const base=(xL)=>({
    responsive:true,maintainAspectRatio:true,indexAxis:'y',
    plugins:{legend:{labels:{color:'#a0a0b0',font:{size:10}}}},
    scales:{
      y:{ticks:{color:'#a0a0b0',font:{size:9}},grid:{color:'rgba(255,255,255,.05)'},
         title:{display:true,text:'深度 m',color:'#a0a0b0',font:{size:9}}},
      x:{ticks:{color:'#a0a0b0',font:{size:9}},grid:{color:'rgba(255,255,255,.07)'},
         title:{display:true,text:xL,color:'#a0a0b0',font:{size:9}}}
    }
  });
  charts.ep=new Chart(document.getElementById('chart-ep'),{type:'line',data:{labels,datasets:[
    {label:'Pa',data:idx.map(i=>r.pa[i]),borderColor:'#e94560',backgroundColor:'rgba(233,69,96,.15)',fill:true,tension:.2,pointRadius:0,borderWidth:2},
    {label:'Pp',data:idx.map(i=>r.pp[i]||0),borderColor:'#4cc9f0',backgroundColor:'rgba(76,201,240,.1)',fill:true,tension:.2,pointRadius:0,borderWidth:2},
  ]},options:base('土圧 kN/m²')});
  charts.sfd=new Chart(document.getElementById('chart-sfd'),{type:'line',data:{labels,datasets:[
    {label:'Q',data:idx.map(i=>r.sfd[i]),borderColor:'#ffd166',backgroundColor:'rgba(255,209,102,.1)',fill:true,tension:.2,pointRadius:0,borderWidth:2}
  ]},options:base('Q kN/m')});
  charts.bmd=new Chart(document.getElementById('chart-bmd'),{type:'line',data:{labels,datasets:[
    {label:'M',data:idx.map(i=>r.bmd[i]),borderColor:'#06d6a0',backgroundColor:'rgba(6,214,160,.1)',fill:true,tension:.2,pointRadius:0,borderWidth:2}
  ]},options:base('M kN·m/m')});
}

function setStatus(msg,type){
  const el=document.getElementById('status-msg');el.textContent=msg;el.className='sbar '+type;
}

// ============================================================
// EXPORT
// ============================================================
function exportCSV(){
  if(!lastResult){alert('先に計算を実行');return;}
  const r=lastResult.final;
  let csv='深度(m),Pa(kN/m2),Pp(kN/m2),正味(kN/m2),Q(kN/m),M(kN.m/m)\n';
  r.depths.forEach((z,i)=>{
    csv+=`${z.toFixed(3)},${r.pa[i].toFixed(3)},${(r.pp[i]||0).toFixed(3)},${r.pnet[i].toFixed(3)},${r.sfd[i].toFixed(4)},${r.bmd[i].toFixed(4)}\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='土留め親ぐい計算結果.csv';a.click();
}

  ln(`必要根入れ長 D = ${r.D.toFixed(2)} m`);
  ln(`最大曲げモーメント Mmax = ${r.Mmax.toFixed(2)} kN·m/m`);
  ln(`最大曲げ応力度 σ = ${r.sig_b.toFixed(1)} N/mm²　fb = ${r.fb} N/mm²　比率 = ${r.ratio.toFixed(3)}　${r.ratio<=1?'OK':'NG'}`);
  ln(`必要断面係数 Z_req = ${r.Z_req.toFixed(0)} cm³　採用 Z = ${r.Z_cm3} cm³`);
  doc.setLineWidth(.2);doc.line(14,y,196,y);y+=4;
  const hv=r.heaving,bl=r.boiling;
  if(hv.applicable) ln(`ヒービング Fs(Terzaghi) = ${hv.Fs_t.toFixed(2)}  Fs(Bjerrum-Eide) = ${hv.Fs_be.toFixed(2)}`);
  if(bl.applicable) ln(`ボイリング Fs = ${bl.Fs.toFixed(2)}`);
  let cx=14,cy=y+4;

    doc.addImage(document.getElementById(id).toDataURL('image/png'),'PNG',cx,cy+2,56,48);
    cx+=60;

  doc.save('土留め親ぐい計算書.pdf');
}
