<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ガイア積算システム</title>
<script src="jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#1a1a2e;--surface:#16213e;--surface2:#0f3460;
  --accent:#e94560;--accent2:#4cc9f0;--accent3:#7bed9f;
  --text:#eaeaea;--text2:#a0a0b0;--border:#2a2a4a;
  --ok:#4caf50;--warn:#ff9800;--err:#f44336;--r:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Arial,'Hiragino Sans',sans-serif;font-size:13px}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:12px;height:52px;flex-shrink:0}
.logo{font-size:1.1rem;font-weight:700;color:var(--accent2);letter-spacing:.05em;white-space:nowrap}
.logo em{color:var(--accent3);font-style:normal}
.hdr-proj{color:var(--text2);font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px}
.tabs{display:flex;gap:2px;margin-left:auto;flex-shrink:0}
.tbtn{padding:6px 14px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:.82rem;border-radius:var(--r);transition:.2s;white-space:nowrap}
.tbtn.active{background:var(--surface2);color:var(--accent2);border-bottom:2px solid var(--accent2)}
.tbtn:hover:not(.active){background:rgba(255,255,255,.05)}

.content{flex:1;overflow:hidden}
.tab-pane{display:none;height:100%;overflow:auto;padding:14px;flex-direction:column;gap:10px}
.tab-pane.active{display:flex}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.card-title{font-size:.88rem;font-weight:700;color:var(--accent2);margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.fg label{display:block;font-size:.73rem;color:var(--text2);margin-bottom:3px}
.fg input,.fg select{width:100%;padding:7px 9px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:.85rem}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--accent2)}

.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.78rem}
thead tr{background:var(--surface2)}
th{padding:7px 8px;text-align:left;color:var(--text2);font-weight:600;font-size:.72rem;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:4px 7px;border-bottom:1px solid rgba(42,42,74,.4);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.015)}
td input,td select{width:100%;padding:3px 6px;background:transparent;border:1px solid transparent;border-radius:3px;color:var(--text);font-size:.78rem;min-height:26px}
td input:focus,td select:focus{background:var(--surface2);border-color:var(--accent2);outline:none}
.num{text-align:right;font-family:monospace;color:var(--accent3)}
.cat-row td{background:var(--surface2);font-weight:700;color:var(--accent3)}
.subtotal{text-align:right;font-family:monospace;color:var(--accent2);font-weight:700}
.tf-total{text-align:right;font-family:monospace;color:var(--accent);font-weight:700;font-size:.9rem}

.btn{padding:5px 12px;border:none;border-radius:var(--r);cursor:pointer;font-size:.78rem;font-weight:600;transition:.2s}
.btn-p{background:var(--accent2);color:#000}
.btn-p:hover{opacity:.85}
.btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-s:hover{border-color:var(--accent2)}
.btn-d{background:transparent;color:var(--err);border:1px solid var(--err);padding:2px 7px;font-size:.72rem}
.btn-d:hover{background:var(--err);color:#fff}
.btn-ok{background:var(--ok);color:#fff}
.bgrp{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

.rate-input{width:70px;text-align:right;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:.85rem}
.rate-input:focus{outline:none;border-color:var(--accent2)}

.sumtbl{width:100%;max-width:520px}
.sumtbl td{padding:5px 10px}
.sval{text-align:right;font-family:monospace;font-size:.88rem}
.sbold{font-weight:700;color:var(--accent2)}
.stotal{font-weight:700;color:var(--accent3);font-size:.95rem}
.sfinal{font-weight:700;color:var(--ok);font-size:1rem}
.stax{color:var(--warn)}

.comp-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-top:8px}

.statusbar{background:var(--surface);border-top:1px solid var(--border);padding:4px 16px;display:flex;gap:18px;font-size:.72rem;color:var(--text2);flex-shrink:0}
.statusbar .sv{color:var(--accent3);font-weight:700;font-family:monospace}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo">ガ<em>イ</em>ア <span style="font-size:.75rem;color:var(--text2);font-weight:400">積算システム</span></div>
  <div class="hdr-proj" id="hdr-proj">（工事名未入力）</div>
  <div class="tabs">
    <button class="tbtn active" onclick="showTab('proj',this)">概要</button>
    <button class="tbtn" onclick="showTab('items',this)">工種・数量</button>
    <button class="tbtn" onclick="showTab('master',this)">単価マスタ</button>
    <button class="tbtn" onclick="showTab('composite',this)">複合単価</button>
    <button class="tbtn" onclick="showTab('summary',this)">集計・出力</button>
  </div>
</header>

<div class="content">

<!-- ===== TAB: 概要 ===== -->
<div id="tab-proj" class="tab-pane active">
  <div class="card">
    <div class="card-title">工事概要</div>
    <div class="fgrid">
      <div class="fg"><label>工事名称</label><input id="p-name" placeholder="例：〇〇道路改良工事" oninput="updProj()"></div>
      <div class="fg"><label>工事場所</label><input id="p-place" placeholder="例：〇〇県〇〇市" oninput="updProj()"></div>
      <div class="fg"><label>発注者</label><input id="p-owner" placeholder="例：〇〇県〇〇土木事務所" oninput="updProj()"></div>
      <div class="fg"><label>施工者</label><input id="p-contractor" placeholder="例：株式会社〇〇建設" oninput="updProj()"></div>
      <div class="fg"><label>設計年月日</label><input type="date" id="p-date" oninput="updProj()"></div>
      <div class="fg"><label>工期</label><input id="p-period" placeholder="例：令和○年○月○日〜○月○日" oninput="updProj()"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">工事費概算</div>
    <table class="sumtbl"><tbody id="ov-summary"></tbody></table>
  </div>
  <div class="card">
    <div class="card-title">データ管理</div>
    <div class="bgrp">
      <button class="btn btn-p" onclick="saveData()">保存（ローカル）</button>
      <button class="btn btn-s" onclick="loadData()">読み込み</button>
      <button class="btn btn-s" onclick="expJSON()">JSONエクスポート</button>
      <button class="btn btn-s" onclick="document.getElementById('imp-f').click()">JSONインポート</button>
      <input type="file" id="imp-f" accept=".json" style="display:none" onchange="impJSON(event)">
      <button class="btn btn-d" onclick="resetAll()">リセット</button>
    </div>
  </div>
</div>

<!-- ===== TAB: 工種・数量 ===== -->
<div id="tab-items" class="tab-pane">
  <div class="bgrp">
    <button class="btn btn-p" onclick="addCat()">＋ 工種追加</button>
    <button class="btn btn-s" onclick="insertSample()">サンプルデータ</button>
    <span style="color:var(--text2);font-size:.72rem">※ 金額＝数量×単価（自動計算）</span>
  </div>
  <div class="card" style="padding:0;flex:1;min-height:0">
    <div class="tbl-wrap" style="height:100%;overflow:auto">
      <table>
        <thead><tr>
          <th style="width:28px">#</th>
          <th style="width:150px">工種名称</th>
          <th style="width:130px">規格・摘要</th>
          <th style="width:65px">数量</th>
          <th style="width:52px">単位</th>
          <th style="width:200px">単価（円）</th>
          <th style="width:110px">金額（円）</th>
          <th style="width:100px">備考</th>
          <th style="width:50px"></th>
        </tr></thead>
        <tbody id="items-body"></tbody>
        <tfoot><tr>
          <td colspan="6" style="text-align:right;color:var(--text2);padding-right:10px;font-weight:600">直接工事費 合計</td>
          <td id="items-total" class="tf-total"></td>
          <td colspan="2"></td>
        </tr></tfoot>
      </table>
    </div>
  </div>
</div>

<!-- ===== TAB: 単価マスタ ===== -->
<div id="tab-master" class="tab-pane">
  <div class="card">
    <div class="card-title">労務費単価
      <button class="btn btn-s" style="font-size:.72rem;padding:3px 9px" onclick="addLabor()">＋ 追加</button>
      <button class="btn btn-s" style="font-size:.72rem;padding:3px 9px" onclick="dfltLabor()">標準挿入</button>
    </div>
    <div class="tbl-wrap">
      <table><thead><tr><th>#</th><th style="width:150px">職種名称</th><th style="width:130px">等級・資格</th><th style="width:100px">単価（円/日）</th><th>備考</th><th style="width:45px"></th></tr></thead>
      <tbody id="labor-body"></tbody></table>
    </div>
  </div>
  <div class="card">
    <div class="card-title">材料費単価
      <button class="btn btn-s" style="font-size:.72rem;padding:3px 9px" onclick="addMat()">＋ 追加</button>
      <button class="btn btn-s" style="font-size:.72rem;padding:3px 9px" onclick="dfltMat()">標準挿入</button>
    </div>
    <div class="tbl-wrap">
      <table><thead><tr><th>#</th><th style="width:150px">材料名称</th><th style="width:130px">規格</th><th style="width:52px">単位</th><th style="width:100px">単価（円）</th><th>備考</th><th style="width:45px"></th></tr></thead>
      <tbody id="mat-body"></tbody></table>
    </div>
  </div>
  <div class="card">
    <div class="card-title">機械経費単価
      <button class="btn btn-s" style="font-size:.72rem;padding:3px 9px" onclick="addEq()">＋ 追加</button>
      <button class="btn btn-s" style="font-size:.72rem;padding:3px 9px" onclick="dfltEq()">標準挿入</button>
    </div>
    <div class="tbl-wrap">
      <table><thead><tr><th>#</th><th style="width:150px">機械名称</th><th style="width:130px">規格</th><th style="width:52px">単位</th><th style="width:100px">損料（円）</th><th>備考</th><th style="width:45px"></th></tr></thead>
      <tbody id="eq-body"></tbody></table>
    </div>
  </div>
</div>

<!-- ===== TAB: 複合単価 ===== -->
<div id="tab-composite" class="tab-pane">
  <div class="bgrp">
    <button class="btn btn-p" onclick="addComp()">＋ 複合単価追加</button>
    <span style="color:var(--text2);font-size:.72rem">※ 「工種・数量」タブで複合単価を参照できます</span>
  </div>
  <div id="comp-list"></div>
</div>

<!-- ===== TAB: 集計・出力 ===== -->
<div id="tab-summary" class="tab-pane">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="card">
      <div class="card-title">工事費積み上げ</div>
      <table class="sumtbl"><tbody id="sum-body"></tbody></table>
    </div>
    <div class="card">
      <div class="card-title">間接費率・設定</div>
      <table style="width:100%">
        <tr><td style="padding:5px 0;color:var(--text2)">共通仮設費率 (%)</td><td><input class="rate-input" id="r-temp" type="number" value="10" min="0" step="0.1" oninput="updSum()"></td></tr>
        <tr><td style="padding:5px 0;color:var(--text2)">現場管理費率 (%)</td><td><input class="rate-input" id="r-site" type="number" value="15" min="0" step="0.1" oninput="updSum()"></td></tr>
        <tr><td style="padding:5px 0;color:var(--text2)">一般管理費率 (%)</td><td><input class="rate-input" id="r-gen" type="number" value="12" min="0" step="0.1" oninput="updSum()"></td></tr>
        <tr><td style="padding:5px 0;color:var(--text2)">消費税率 (%)</td><td><input class="rate-input" id="r-tax" type="number" value="10" min="0" step="0.1" oninput="updSum()"></td></tr>
        <tr><td style="padding:5px 0;color:var(--text2)">丸め</td><td>
          <select id="r-round" onchange="updSum()" style="width:110px;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:.82rem">
            <option value="1">1円</option><option value="10">10円</option><option value="100" selected>100円</option><option value="1000">1000円</option>
          </select>
        </td></tr>
      </table>
    </div>
  </div>
  <div class="card">
    <div class="card-title">出力</div>
    <div class="bgrp">
      <button class="btn btn-ok" onclick="expPDF()">PDF出力（工事費内訳書）</button>
    </div>
  </div>
</div>

</div><!-- /content -->

<div class="statusbar">
  <span>直接工事費: <span class="sv" id="sb-d">¥0</span></span>
  <span>工事費(税込): <span class="sv" id="sb-t">¥0</span></span>
  <span>工種数: <span class="sv" id="sb-c">0</span></span>
  <span>細目数: <span class="sv" id="sb-i">0</span></span>
</div>
</div>

<script>
// ============ STATE ============
let S = {
  proj:{name:'',place:'',owner:'',contractor:'',date:'',period:''},
  cats:[], labor:[], mat:[], eq:[], comp:[],
  rates:{temp:10,site:15,gen:12,tax:10},
  rnd:100,
  _cid:1,_iid:1,_mid:1,_cpid:1
};

// ============ UTILS ============
const n=v=>parseFloat(v)||0;
const fmt=v=>Math.round(v).toLocaleString('ja-JP');
const yen=v=>'¥'+Math.round(v).toLocaleString('ja-JP');
const rnd=(v,r)=>Math.round(v/r)*r;
const eid=id=>document.getElementById(id);
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

function rid(){return S._mid++}

// ============ CALCULATIONS ============
function calcDirect(){
  let t=0;
  S.cats.forEach(c=>c.items.forEach(it=>t+=n(it.qty)*n(it.up)));
  return t;
}

function calcComp(cp){
  return cp.rows.reduce((s,r)=>s+n(r.qty)*n(r.up),0);
}

function calcSum(){
  const d=calcDirect(),rt=S.rates;
  const temp=rnd(d*rt.temp/100,S.rnd);
  const net=d+temp;
  const site=rnd(net*rt.site/100,S.rnd);
  const prime=net+site;
  const gen=rnd(prime*rt.gen/100,S.rnd);
  const price=prime+gen;
  const tax=rnd(price*rt.tax/100,S.rnd);
  return{d,temp,net,site,prime,gen,price,tax,total:price+tax};
}

// ============ PROJECT ============
function updProj(){
  S.proj.name=eid('p-name').value;
  S.proj.place=eid('p-place').value;
  S.proj.owner=eid('p-owner').value;
  S.proj.contractor=eid('p-contractor').value;
  S.proj.date=eid('p-date').value;
  S.proj.period=eid('p-period').value;
  eid('hdr-proj').textContent=S.proj.name||'（工事名未入力）';
  rendOvSum();updSB();
}

function rendOvSum(){
  const s=calcSum();
  const rows=[
    ['直接工事費',s.d,''],
    [`共通仮設費（${S.rates.temp}%）`,s.temp,''],
    ['純工事費',s.net,true],
    [`現場管理費（${S.rates.site}%）`,s.site,''],
    ['工事原価',s.prime,true],
    [`一般管理費等（${S.rates.gen}%）`,s.gen,''],
    ['工事価格',s.price,true],
    [`消費税（${S.rates.tax}%）`,s.tax,'tax'],
    ['工事費（税込）',s.total,'final'],
  ];
  eid('ov-summary').innerHTML=rows.map(([l,v,m])=>{
    const cls=m==='final'?'sfinal':m==='tax'?'stax':m?'sbold':'';
    return`<tr><td style="padding:4px 8px;color:var(--text2)">${l}</td><td class="sval ${cls}" style="font-weight:${m?700:400}">${yen(v)}</td></tr>`;
  }).join('');
}

// ============ TABS ============
function showTab(name,btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));
  eid('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='items')rendItems();
  if(name==='master')rendMaster();
  if(name==='composite')rendComp();
  if(name==='summary'){updSum();rendSum();}
  if(name==='proj')rendOvSum();
}

// ============ ITEMS ============
const UNITS=['m','m²','m³','本','箇所','式','t','kg','L','枚','個','台','組'];

function addCat(){
  const nm=prompt('工種名を入力\n例：土工、コンクリート工、舗装工','');
  if(!nm)return;
  S.cats.push({id:S._cid++,name:nm,items:[]});
  rendItems();updSB();
}

function delCat(cid){
  if(!confirm('この工種を削除しますか？'))return;
  S.cats=S.cats.filter(c=>c.id!==cid);
  rendItems();updSB();
}

function addItem(cid){
  const c=S.cats.find(c=>c.id===cid);
  if(!c)return;
  c.items.push({id:S._iid++,name:'',spec:'',qty:'',unit:'m³',mode:'direct',up:'',cref:'',note:''});
  rendItems();
}

function delItem(cid,iid){
  const c=S.cats.find(c=>c.id===cid);
  if(c)c.items=c.items.filter(it=>it.id!==iid);
  rendItems();updSB();
}

function updItem(cid,iid,f,v){
  const c=S.cats.find(c=>c.id===cid);if(!c)return;
  const it=c.items.find(it=>it.id===iid);if(!it)return;
  it[f]=v;
  if(f==='mode'&&v==='comp'){it.up='';it.cref='';}
  if(f==='cref'&&v){
    const cp=S.comp.find(cp=>cp.id==v);
    if(cp)it.up=calcComp(cp).toFixed(0);
  }
  rendItems();updSB();
}

function rendItems(){
  const uOpts=UNITS.map(u=>`<option>${u}</option>`).join('');
  const cpOpts=S.comp.map(cp=>`<option value="${cp.id}">${esc(cp.name)}（${yen(calcComp(cp))}/${cp.unit}）</option>`).join('');

  let html='',rn=0,total=0;
  S.cats.forEach(cat=>{
    let ct=0;
    const irows=cat.items.map(it=>{
      rn++;
      const amt=n(it.qty)*n(it.up);ct+=amt;total+=amt;
      const usel=UNITS.map(u=>`<option${u===it.unit?' selected':''}>${u}</option>`).join('');
      const upCell=it.mode==='comp'
        ?`<div style="display:flex;flex-direction:column;gap:2px">
            <select style="font-size:.7rem;padding:2px 4px;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);width:100%" onchange="updItem(${cat.id},${it.id},'cref',this.value)">
              <option value="">-- 複合単価を選択 --</option>${cpOpts}
            </select>
            <span style="font-size:.7rem;color:var(--text2);text-align:right">${it.up?yen(it.up)+'/'+it.unit:''}</span>
          </div>`
        :`<input type="number" value="${esc(it.up)}" oninput="updItem(${cat.id},${it.id},'up',this.value)" style="text-align:right" min="0" placeholder="0">`;
      return`<tr>
        <td style="color:var(--text2)">${rn}</td>
        <td><input value="${esc(it.name)}" oninput="updItem(${cat.id},${it.id},'name',this.value)" placeholder="種目名"></td>
        <td><input value="${esc(it.spec)}" oninput="updItem(${cat.id},${it.id},'spec',this.value)" placeholder="規格・摘要"></td>
        <td><input type="number" value="${esc(it.qty)}" oninput="updItem(${cat.id},${it.id},'qty',this.value)" style="text-align:right" min="0"></td>
        <td><select onchange="updItem(${cat.id},${it.id},'unit',this.value)">${usel}</select></td>
        <td>
          <select style="font-size:.7rem;margin-bottom:2px;padding:2px 4px;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);width:100%" onchange="updItem(${cat.id},${it.id},'mode',this.value)">
            <option value="direct"${it.mode==='direct'?' selected':''}>直接入力</option>
            <option value="comp"${it.mode==='comp'?' selected':''}>複合単価参照</option>
          </select>
          ${upCell}
        </td>
        <td class="num">${amt>0?fmt(amt):'—'}</td>
        <td><input value="${esc(it.note)}" oninput="updItem(${cat.id},${it.id},'note',this.value)" placeholder="備考"></td>

function addComp(){
  const nm=prompt('複合単価の名称を入力\n例：土砂掘削（機械）','');if(!nm)return;
  const un=prompt('単位を入力','m³');
  S.comp.push({id:S._cpid++,name:nm,unit:un||'m³',rows:[]});
  rendComp();
}
function delComp(id){
  if(!confirm('削除しますか？'))return;
  S.comp=S.comp.filter(c=>c.id!==id);rendComp();
}
function addCR(cid,type){
  const cp=S.comp.find(c=>c.id===cid);if(!cp)return;
  cp.rows.push({type,ref:'',qty:1,unit:type==='labor'?'人日':'',up:0});
  rendComp();
}
function delCR(cid,idx){
  const cp=S.comp.find(c=>c.id===cid);if(cp)cp.rows.splice(idx,1);rendComp();
}
function updCR(cid,idx,f,v){
  const cp=S.comp.find(c=>c.id===cid);if(!cp||!cp.rows[idx])return;
  cp.rows[idx][f]=v;
  if(f==='ref'&&v){
    const r=cp.rows[idx];
    let m=null;
    if(r.type==='labor')m=S.labor.find(x=>x.id==v);
    else if(r.type==='mat')m=S.mat.find(x=>x.id==v);
    else m=S.eq.find(x=>x.id==v);
    if(m){r.up=n(m.price);r.unit=m.unit||r.unit;}
  }
  rendComp();
}

function rendComp(){
  const el=eid('comp-list');
  if(!S.comp.length){
    el.innerHTML='<div class="card" style="text-align:center;color:var(--text2);padding:28px">「＋ 複合単価追加」で追加してください</div>';return;
  }
  el.innerHTML=S.comp.map(cp=>{
    const tot=calcComp(cp);
    const lOpts=S.labor.map(r=>`<option value="${r.id}">${esc(r.name)}（¥${fmt(r.price)}/日）</option>`).join('');
    const mOpts=S.mat.map(r=>`<option value="${r.id}">${esc(r.name)} ${esc(r.spec)}（¥${fmt(r.price)}/${r.unit}）</option>`).join('');
    const eOpts=S.eq.map(r=>`<option value="${r.id}">${esc(r.name)} ${esc(r.spec)}（¥${fmt(r.price)}/${r.unit}）</option>`).join('');
    const rrows=cp.rows.map((r,i)=>{
      const typeMap={labor:['労務','var(--accent2)',lOpts],mat:['材料','var(--accent3)',mOpts],eq:['機械','var(--warn)',eOpts]};
      const[tl,tc,opts]=typeMap[r.type]||['?','',''];
      const amt=n(r.qty)*n(r.up);
      return`<tr>
        <td style="color:${tc};font-weight:700;width:36px;font-size:.7rem">${tl}</td>
        <td><select style="width:100%;font-size:.72rem;padding:2px 5px;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text)" onchange="updCR(${cp.id},${i},'ref',this.value)">
          <option value="">-- 選択 --</option>${opts}</select></td>
        <td style="width:70px"><input type="number" value="${r.qty}" min="0" step="0.1" oninput="updCR(${cp.id},${i},'qty',this.value)" style="width:65px;text-align:right;padding:2px 5px;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);font-size:.78rem"></td>
        <td style="width:45px;color:var(--text2);font-size:.72rem">${r.unit}</td>
        <td style="width:90px"><input type="number" value="${r.up}" min="0" oninput="updCR(${cp.id},${i},'up',this.value)" style="width:85px;text-align:right;padding:2px 5px;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);font-size:.78rem"></td>
        <td style="width:90px;text-align:right;font-family:monospace;color:var(--accent3)">${fmt(amt)}</td>
        <td style="width:36px"><button class="btn btn-d" onclick="delCR(${cp.id},${i})">×</button></td>
      </tr>`;
    }).join('');
    return`<div class="card" style="margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-weight:700;color:var(--accent2)">${esc(cp.name)}</span>
        <span style="color:var(--text2);font-size:.8rem">/ ${cp.unit}</span>

        <button class="btn btn-d" onclick="delComp(${cp.id})">削除</button>
      </div>
      <div class="comp-box">
        <table style="width:100%;font-size:.78rem">
          <thead><tr><th>区分</th><th>名称</th><th>数量</th><th>単位</th><th>単価（円）</th><th style="text-align:right">金額</th><th></th></tr></thead>
          <tbody>${rrows}</tbody>
          <tfoot><tr><td colspan="5" style="text-align:right;padding:5px 8px;color:var(--text2)">小計</td>
            <td style="text-align:right;font-family:monospace;color:var(--accent2);font-weight:700;padding:5px 8px">${yen(tot)}</td><td></td></tr></tfoot>
        </table>
        <div class="bgrp" style="margin-top:8px">
          <button class="btn btn-s" style="font-size:.7rem;padding:3px 9px" onclick="addCR(${cp.id},'labor')">＋ 労務費</button>
          <button class="btn btn-s" style="font-size:.7rem;padding:3px 9px" onclick="addCR(${cp.id},'mat')">＋ 材料費</button>
          <button class="btn btn-s" style="font-size:.7rem;padding:3px 9px" onclick="addCR(${cp.id},'eq')">＋ 機械費</button>

  }).join('');
}

// ============ PDF EXPORT ============
function expPDF(){
  if(!window.jspdf){alert('jsPDFが読み込まれていません');return;}
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4',orientation:'portrait'});
  const W=210,M=14,CW=W-M*2;
  let y=18;

  // Title
  doc.setFontSize(15);doc.setFont('helvetica','bold');
  doc.text('工 事 費 内 訳 書',W/2,y,{align:'center'});y+=8;
  doc.setDrawColor(76,201,240);doc.setLineWidth(0.5);
  doc.line(M,y,W-M,y);y+=6;

  // Project info
  doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(60,60,80);
  const p=S.proj;
  doc.text(`工事名称：${p.name||'（未入力）'}`,M,y);y+=5;
  doc.text(`工事場所：${p.place||'（未入力）'}`,M,y);
  doc.text(`設計年月日：${p.date||''}`,W-M,y,{align:'right'});y+=5;
  doc.text(`発注者：${p.owner||'（未入力）'}`,M,y);
  doc.text(`施工者：${p.contractor||'（未入力）'}`,W-M,y,{align:'right'});y+=7;
  doc.setTextColor(0,0,0);

  // Items table header
  doc.setFontSize(9.5);doc.setFont('helvetica','bold');
  doc.text('■ 工事費内訳',M,y);y+=4;

  const cw={no:8,name:52,spec:42,qty:16,unit:13,up:24,amt:24};
  doc.setFillColor(15,52,96);doc.rect(M,y-3.5,CW,6,'F');
  doc.setTextColor(180,220,255);doc.setFontSize(7.5);
  let x=M;
  doc.text('No.',x+2,y);x+=cw.no;
  doc.text('工種名称',x+1,y);x+=cw.name;
  doc.text('規格・摘要',x+1,y);x+=cw.spec;
  doc.text('数量',x+cw.qty,y,{align:'right'});x+=cw.qty;
  doc.text('単位',x+1,y);x+=cw.unit;
  doc.text('単価(円)',x+cw.up,y,{align:'right'});x+=cw.up;
  doc.text('金額(円)',x+cw.amt,y,{align:'right'});
  y+=5;doc.setTextColor(0,0,0);doc.setFont('helvetica','normal');

  let rn=0;
  S.cats.forEach(cat=>{
    if(y>252){doc.addPage();y=18;}
    let ct=0;cat.items.forEach(it=>ct+=n(it.qty)*n(it.up));
    doc.setFillColor(30,80,150);doc.rect(M,y-3,CW,5.5,'F');
    doc.setTextColor(200,230,255);doc.setFont('helvetica','bold');doc.setFontSize(7.5);
    doc.text('▶ '+cat.name,M+2,y+1);
    doc.text(fmt(ct),W-M-1,y+1,{align:'right'});
    doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);y+=6;

    cat.items.forEach(it=>{
      if(y>265){doc.addPage();y=18;}
      rn++;
      const amt=n(it.qty)*n(it.up);
      x=M;
      doc.text(String(rn),x+cw.no,y,{align:'right'});x+=cw.no;
      doc.text((it.name||'').substring(0,18),x+1,y);x+=cw.name;
      doc.text((it.spec||'').substring(0,15),x+1,y);x+=cw.spec;
      doc.text(String(it.qty||''),x+cw.qty,y,{align:'right'});x+=cw.qty;
      doc.text(it.unit||'',x+1,y);x+=cw.unit;
      doc.text(n(it.up)>0?fmt(it.up):'',x+cw.up,y,{align:'right'});x+=cw.up;
      doc.text(amt>0?fmt(amt):'',x+cw.amt,y,{align:'right'});
      doc.setDrawColor(180,180,200);doc.line(M,y+1.5,W-M,y+1.5);
      y+=5;
    });
  });

  // Direct total
  y+=2;
  if(y>255){doc.addPage();y=18;}
  const s=calcSum();
  doc.setFillColor(20,40,80);doc.rect(M,y-3,CW,6,'F');
  doc.setTextColor(180,220,255);doc.setFont('helvetica','bold');doc.setFontSize(8);
  doc.text('直接工事費 計',M+2,y+1);doc.text(fmt(s.d),W-M-1,y+1,{align:'right'});
  doc.setTextColor(0,0,0);y+=10;

  // Summary
  if(y>230){doc.addPage();y=18;}
  doc.setFont('helvetica','bold');doc.setFontSize(9.5);
  doc.text('■ 工事費積み上げ',M,y);y+=5;doc.setFontSize(8);

  const sumW=100;
  [['直接工事費',s.d,false],
   [`共通仮設費（${S.rates.temp}%）`,s.temp,false],
   ['純工事費',s.net,true],
   [`現場管理費（${S.rates.site}%）`,s.site,false],
   ['工事原価',s.prime,true],
   [`一般管理費等（${S.rates.gen}%）`,s.gen,false],
   ['工事価格',s.price,true],
   [`消費税（${S.rates.tax}%）`,s.tax,false],
   ['工事費（税込）',s.total,true]
  ].forEach(([l,v,b])=>{
    if(b){doc.setFillColor(15,52,96);doc.rect(M,y-3.5,sumW,6,'F');doc.setTextColor(200,230,255);}
    else doc.setTextColor(60,60,80);
    doc.setFont('helvetica',b?'bold':'normal');
    doc.text(l,M+2,y);doc.text(yen(v),M+sumW-2,y,{align:'right'});
    doc.setTextColor(0,0,0);y+=6;
  });

  // Footer
  doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(130,130,130);
  doc.text(`出力日時：${new Date().toLocaleString('ja-JP')}　／　ガイア積算システム`,M,288);

  doc.save(`工事費内訳書_${p.name||'無題'}_${new Date().toISOString().slice(0,10)}.pdf`);
}

function expJSON(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:'application/json'}));
  a.download=`gaia_${S.proj.name||'data'}.json`;a.click();
}
function impJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{Object.assign(S,JSON.parse(ev.target.result));restoreUI();alert('インポートしました。');}catch{alert('読み込み失敗');}};
  r.readAsText(f);e.target.value='';
}
function resetAll(){
  if(!confirm('全データをリセットしますか？'))return;
  S={proj:{name:'',place:'',owner:'',contractor:'',date:'',period:''},
     cats:[],labor:[],mat:[],eq:[],comp:[],
     rates:{temp:10,site:15,gen:12,tax:10},rnd:100,
     _cid:1,_iid:1,_mid:1,_cpid:1};
  restoreUI();
}
function restoreUI(){
  eid('p-name').value=S.proj.name||'';
  eid('p-place').value=S.proj.place||'';
  eid('p-owner').value=S.proj.owner||'';
  eid('p-contractor').value=S.proj.contractor||'';
  eid('p-date').value=S.proj.date||'';
  eid('p-period').value=S.proj.period||'';
  eid('hdr-proj').textContent=S.proj.name||'（工事名未入力）';
  eid('r-temp').value=S.rates.temp;
  eid('r-site').value=S.rates.site;
  eid('r-gen').value=S.rates.gen;
  eid('r-tax').value=S.rates.tax;
  rendItems();rendMaster();rendComp();rendOvSum();updSB();
}

// ============ INIT ============
(function(){
  try{const d=localStorage.getItem('gaia');if(d)Object.assign(S,JSON.parse(d));}catch(e){}
  restoreUI();
})();
</script>
